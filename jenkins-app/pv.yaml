apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Recycle
  storageClassName: idp-nfs
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:
    path: /devops/jenkins_home
    server: vdc.idp.local
